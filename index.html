    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Tooltip Styles */
      [data-tooltip] {
        position: relative;
        cursor: help;
        border-bottom: 1px dotted #9ca3af; /* Tailwind gray-400 */
      }
      [data-tooltip]:before {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        margin-bottom: 5px;
        width: max-content;
        max-width: 250px;
        padding: 8px;
        background-color: #111827; /* Tailwind gray-900 */
        color: #fff;
        border: 1px solid #374151; /* Tailwind gray-700 */
        border-radius: 6px;
        font-size: 0.875rem;
        line-height: 1.25rem;
        text-align: left;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        z-index: 10;
        pointer-events: none;
      }
      [data-tooltip]:hover:before {
        opacity: 1;
        visibility: visible;
      }
    </style>
